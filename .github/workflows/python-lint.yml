name: Python Backend Lint

on:
  push:
  pull_request:

jobs:
  backend-lint:
    name: backend-lint
    runs-on: ubuntu-latest

    steps:
      # Check out the repository so the workflow can access project files.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up the Python runtime used by the backend.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Install flake8 as a lightweight linting dependency.
      - name: Install flake8
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      # Run flake8 against the backend and ignore long line warnings to reduce noise.
      - name: Run flake8
        run: flake8 backend --ignore=E501
