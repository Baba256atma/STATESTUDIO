name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      # Check out the repository so the workflow can access project files.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up the Python runtime used by the backend.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Install backend dependencies only when a requirements file is present.
      - name: Install backend dependencies
        run: |
          if [ -f backend/requirements.txt ]; then
            python -m pip install --upgrade pip
            pip install -r backend/requirements.txt
          else
            echo "No backend/requirements.txt found. Skipping dependency installation."
          fi

      # Run a basic syntax validation pass against the backend source tree.
      - name: Validate backend Python syntax
        run: python -m compileall backend

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      # Check out the repository so the workflow can access project files.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up the Node.js runtime used by the frontend.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Install frontend dependencies from the frontend workspace.
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      # Run lint only if the frontend package defines a lint script.
      - name: Run frontend lint
        working-directory: frontend
        run: |
          if npm run | grep -q " lint"; then
            npm run lint
          else
            echo "No lint script found. Skipping lint."
          fi

      # Run build only if the frontend package defines a build script.
      - name: Run frontend build
        working-directory: frontend
        run: |
          if npm run | grep -q " build"; then
            npm run build
          else
            echo "No build script found. Skipping build."
          fi
