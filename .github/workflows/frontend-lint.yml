name: Frontend Lint

on:
  push:
  pull_request:

jobs:
  frontend-lint:
    name: frontend-lint
    runs-on: ubuntu-latest

    steps:
      # Check out the repository so the workflow can access project files.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up the Node.js runtime used by the frontend.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Install frontend dependencies from the frontend workspace.
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      # Run lint only if the frontend package defines a lint script.
      - name: Run frontend lint
        working-directory: frontend
        run: |
          if npm run | grep -q " lint"; then
            npm run lint
          else
            echo "No lint script found. Skipping lint."
          fi
